<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>uxinspect Recorder</title>
  <style>
    :root {
      --bg: #FAFAFA;
      --surface: #FFFFFF;
      --text: #1D1D1F;
      --muted: #6B7280;
      --border: #E5E7EB;
      --primary: #10B981;
      --primary-light: #6EE7B7;
      --primary-bg: #ECFDF5;
      --secondary: #3B82F6;
      --secondary-bg: #EFF6FF;
      --danger: #EF4444;
      --radius: 6px;
      --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      width: 340px;
    }
    header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    h1 {
      margin: 0; font-size: 14px; font-weight: 600; letter-spacing: -0.01em;
    }
    .sub { margin-top: 2px; font-size: 11px; color: var(--muted); }
    main { padding: 14px 16px; }
    .status {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; margin-bottom: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted);
    }
    .dot.rec { background: var(--danger); animation: pulse 1s infinite; }
    .dot.ok { background: var(--primary); }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-text { flex: 1; font-weight: 500; }
    .count { color: var(--muted); font-variant-numeric: tabular-nums; }
    .row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px;
    }
    button {
      font-family: inherit; font-size: 13px; font-weight: 500;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s ease;
    }
    button:hover:not(:disabled) { border-color: #D1D5DB; background: #F9FAFB; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.primary {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    button.primary:hover:not(:disabled) { background: #059669; border-color: #059669; }
    button.secondary {
      background: var(--secondary-bg);
      color: var(--secondary);
      border-color: #BFDBFE;
    }
    button.secondary:hover:not(:disabled) { background: #DBEAFE; }
    button.danger {
      background: #FEE2E2; color: var(--danger); border-color: #FECACA;
    }
    button.danger:hover:not(:disabled) { background: #FECACA; }
    .row-full button { width: 100%; }
    .footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--muted);
      background: var(--surface);
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer a { color: var(--secondary); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .toast {
      position: fixed; top: 8px; left: 16px; right: 16px;
      padding: 8px 12px;
      background: var(--primary-bg);
      color: #065F46;
      border: 1px solid #A7F3D0;
      border-radius: var(--radius);
      font-size: 12px; font-weight: 500;
      opacity: 0; transform: translateY(-6px);
      transition: all 0.2s ease;
      pointer-events: none;
      z-index: 10;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: #FEE2E2; color: #991B1B; border-color: #FECACA; }
  </style>
</head>
<body>
  <div id="toast" class="toast" role="status"></div>
  <header>
    <h1>uxinspect Recorder</h1>
    <div class="sub">Record clicks, typing, and navigation. Export as uxinspect flow.</div>
  </header>
  <main>
    <div class="status">
      <span id="dot" class="dot"></span>
      <span id="statusText" class="status-text">Idle</span>
      <span id="count" class="count">0 steps</span>
    </div>
    <div class="row">
      <button id="start" class="primary">Start</button>
      <button id="stop" class="danger" disabled>Stop</button>
    </div>
    <div class="row">
      <button id="copy" class="secondary" disabled>Copy as TS</button>
      <button id="download" class="secondary" disabled>Download .ts</button>
    </div>
    <div class="row row-full" style="grid-template-columns: 1fr;">
      <button id="reset" disabled>Clear</button>
    </div>
  </main>
  <div class="footer">
    <span>v0.1.0</span>
    <a href="https://uxinspect.com" target="_blank" rel="noopener">uxinspect.com</a>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
